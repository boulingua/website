baseURL = "https://boulingua.github.io/website/"
title = "boulingua"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = false

[pagination]
  pagerSize = 20

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  author = "S. Le Boulanger"
  description = "Multilingual Teaching · EFL · FLE · DaF"
  keywords = "language teaching,EFL,FLE,DaF,OER,CEFR,curriculum"
  info = ["Multilingual Teaching Platform", "EFL · FLE · DaF", "Ressources"]
  avatarURL = "images/avatar.png"
  favicon_32 = "images/avatar.png"
  favicon_16 = "images/avatar.png"
  dateFormat = "2006-01-02"
  hideFooter = false
  hideCredits = false
  since = 2025
  colorScheme = "auto"
  # Disable the theme's floating toggle; the navbar #dark-mode-toggle is the single control.
  hideColorSchemeToggle = true
  customCSS = ["css/custom.css"]

[[params.social]]
  name = "GitHub"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/boulingua"

